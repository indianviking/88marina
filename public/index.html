<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>88 Marina — Cleaning Schedule</title>
  <link rel="stylesheet" href="css/cleaner.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "d5ad5ce2-5acc-464a-aa31-757a3f74726d",
      });
      OneSignal.User.addTag("role", "cleaner");
    });
  </script>
</head>
<body>
  <header class="header">
    <h1 class="header-title">88 Marina</h1>
    <p class="header-subtitle">Cleaning Schedule</p>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="upcoming">Upcoming</button>
    <button class="tab" data-tab="history">History</button>
    <button class="tab" data-tab="invoice">
      Invoice
      <span class="tab-badge" id="invoice-badge" style="display:none;">0</span>
    </button>
  </nav>

  <main class="content">
    <section class="tab-panel active" id="panel-upcoming">
      <div class="loading" id="upcoming-loading">Loading upcoming cleans...</div>
      <div id="upcoming-list"></div>
      <div class="empty-state" id="upcoming-empty" style="display:none;">
        <p>No upcoming cleans scheduled.</p>
      </div>
    </section>

    <section class="tab-panel" id="panel-history">
      <div class="loading" id="history-loading">Loading history...</div>
      <div id="history-list"></div>
      <div class="empty-state" id="history-empty" style="display:none;">
        <p>No cleaning history yet.</p>
      </div>
    </section>

    <section class="tab-panel" id="panel-invoice">
      <div class="loading" id="invoice-loading">Loading invoice data...</div>
      <div id="invoice-content"></div>
    </section>
  </main>

  <script src="js/cleaner.js"></script>
</body>
</html>
